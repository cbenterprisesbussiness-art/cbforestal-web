<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CB FORESTAL</title>

<style>
body{margin:0;font-family:'DM Sans',sans-serif;background:#0f1f16;color:#fafaf7}
nav{position:fixed;top:0;width:100%;background:#1a3a2a;padding:15px 30px;display:flex;justify-content:space-between;z-index:1000}
.nav-logo{font-weight:bold;font-size:20px;color:#b7e4c7}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:100px 40px;background:#1a3a2a}
.btn{background:#52b788;padding:12px 22px;color:#1a3a2a;text-decoration:none;display:inline-block;margin-top:15px}
.section{padding:80px 40px}
.lang button{margin-left:10px;padding:6px 10px;cursor:pointer}
</style>
</head>

<body>

<nav>
<div class="nav-logo">CB FORESTAL</div>
<div class="lang">
<button onclick="setLang('ca')">CAT</button>
<button onclick="setLang('es')">ES</button>
</div>
</nav>

<section class="hero">
<h1>
<span data-ca="Experts en tala i poda" data-es="Expertos en tala y poda"></span><br>
<span data-ca="de pins i arbres" data-es="de pinos y árboles"></span>
</h1>

<p data-ca="Serveis professionals a Catalunya amb resposta ràpida i garantia total"
   data-es="Servicios profesionales en Cataluña con respuesta rápida y garantía total"></p>

<a href="#contacto" class="btn"
data-ca="Demanar pressupost"
data-es="Solicitar presupuesto"></a>
</section>

<section class="section">
<h2 data-ca="Serveis forestals" data-es="Servicios forestales"></h2>

<p data-ca="Realitzem treballs complets de tala, poda, desbrossament i vallats"
   data-es="Realizamos trabajos completos de tala, poda, desbroce y vallados"></p>

<ul>
<li data-ca="Tala de pins controlada" data-es="Tala de pinos controlada"></li>
<li data-ca="Poda en altura" data-es="Poda en altura"></li>
<li data-ca="Desbrossaments de terrenys" data-es="Desbroces de terrenos"></li>
<li data-ca="Instal·lació de vallats" data-es="Instalación de vallados"></li>
</ul>
</section>

<section class="section" style="background:#1a3a2a">
<h2 data-ca="Zones de servei" data-es="Zonas de servicio"></h2>

<p data-ca="Treballam a tota Catalunya"
   data-es="Trabajamos en toda Cataluña"></p>

<ul>
<li>Barcelona</li>
<li>Girona</li>
<li>Tarragona</li>
<li>Lleida</li>
</ul>
</section>

<section id="contacto" class="section">
<h2 data-ca="Contacte" data-es="Contacto"></h2>

<p data-ca="Truca'ns o escriu-nos per WhatsApp"
   data-es="Llámanos o escríbenos por WhatsApp"></p>

<a href="tel:+34930304696" class="btn">📞 930304696</a><br><br>
<a href="https://wa.me/34638624355" class="btn">💬 WhatsApp</a>
</section>

<script>
function setLang(lang){
document.querySelectorAll('[data-ca]').forEach(el=>{
el.innerHTML = el.getAttribute('data-'+lang);
});
localStorage.setItem('lang',lang);
}
document.addEventListener("DOMContentLoaded",()=>{
let lang=localStorage.getItem('lang')||'es';
setLang(lang);
});
</script>

</body>
</html>
